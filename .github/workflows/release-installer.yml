name: Release Installer

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-installer:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Resolve release version
        id: version
        shell: powershell
        run: |
          $tagName = "${{ github.ref_name }}"
          $version = $tagName.TrimStart("v")
          $installerBaseName = "DipsyDolphin-Setup-$version"
          "tag_name=$tagName" >> $env:GITHUB_OUTPUT
          "app_version=$version" >> $env:GITHUB_OUTPUT
          "installer_base_name=$installerBaseName" >> $env:GITHUB_OUTPUT
          "installer_path=.artifacts/windows/installer/$installerBaseName.exe" >> $env:GITHUB_OUTPUT

      - name: Build installer
        shell: powershell
        run: |
          powershell -ExecutionPolicy Bypass -File .\packaging\windows\build-installer.ps1 -Clean -AppVersion "${{ steps.version.outputs.app_version }}" -OutputBaseName "${{ steps.version.outputs.installer_base_name }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.installer_base_name }}
          path: ${{ steps.version.outputs.installer_path }}

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          artifacts: ${{ steps.version.outputs.installer_path }}
          artifactErrorsFailBuild: true
          generateReleaseNotes: true
          name: Dipsy Dolphin ${{ steps.version.outputs.tag_name }}
          tag: ${{ steps.version.outputs.tag_name }}
