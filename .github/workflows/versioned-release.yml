name: Versioned Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: dipsy-versioned-release
  cancel-in-progress: true

jobs:
  resolve-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.version.outputs.should_release }}
      current_version: ${{ steps.version.outputs.current_version }}
      previous_version: ${{ steps.version.outputs.previous_version }}
      is_prerelease: ${{ steps.version.outputs.is_prerelease }}
      release_type: ${{ steps.version.outputs.release_type }}
      tag_name: ${{ steps.version.outputs.tag_name }}
      release_name: ${{ steps.version.outputs.release_name }}
      installer_base_name: ${{ steps.version.outputs.installer_base_name }}
      installer_path: ${{ steps.version.outputs.installer_path }}
      release_notes_path: ${{ steps.version.outputs.release_notes_path }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Resolve release metadata from pyproject.toml
        id: version
        run: |
          python -m scripts.versioning --ref "${{ github.event.before }}" --github-output "$GITHUB_OUTPUT"

  build-release:
    needs: resolve-release
    if: needs.resolve-release.outputs.should_release == 'true'
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.12"
          enable-cache: true

      - name: Install Inno Setup
        shell: powershell
        run: choco install innosetup --no-progress -y

      - name: Run release helper tests
        shell: powershell
        run: |
          uv run pytest tests/test_versioning.py tests/test_windows_build.py

      - name: Build installer for versioned release
        shell: powershell
        run: |
          python -m scripts.windows_build installer --clean --app-version "${{ needs.resolve-release.outputs.current_version }}" --output-base-name "${{ needs.resolve-release.outputs.installer_base_name }}"

      - name: Validate release artifacts
        shell: powershell
        run: |
          python -m scripts.windows_build release-smoke --app-version "${{ needs.resolve-release.outputs.current_version }}" --installer-path "${{ needs.resolve-release.outputs.installer_path }}"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ needs.resolve-release.outputs.installer_base_name }}
          path: ${{ needs.resolve-release.outputs.installer_path }}

      - name: Load curated release notes
        id: release_notes
        shell: powershell
        run: |
          $path = "${{ needs.resolve-release.outputs.release_notes_path }}"
          if (-not (Test-Path $path)) {
            throw "Release notes file not found: $path"
          }
          "body<<EOF" >> $env:GITHUB_OUTPUT
          Get-Content -Raw $path >> $env:GITHUB_OUTPUT
          "EOF" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          artifacts: ${{ needs.resolve-release.outputs.installer_path }}
          artifactErrorsFailBuild: true
          body: ${{ steps.release_notes.outputs.body }}
          name: ${{ needs.resolve-release.outputs.release_name }}
          prerelease: ${{ needs.resolve-release.outputs.is_prerelease == 'true' }}
          removeArtifacts: true
          replacesArtifacts: true
          tag: ${{ needs.resolve-release.outputs.tag_name }}
